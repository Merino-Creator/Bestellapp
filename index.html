<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellapp</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/styles/standard.css">
    <link rel="stylesheet" href="/styles/assets.css">
</head>

<body>

    <header>
        <div class="content_wrapper">
            <div class="header_content">
                <div><img src="/assets/imgs/mainLogo.png" alt="Bestellapp Logo"></div>
                <div class="burger_menu" onclick="myFunction(this)">
                    <div class="bar1"></div>
                    <div class="bar2"></div>
                    <div class="bar3"></div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="content_wrapper">
            <section id="topSection">
            <div class="hero_img"></div>
            <div class="restaurant_logo"></div>
            <h1><span style="color: rgb(255, 115, 0);">Burger</span>House</h1>
            <h3>The greatest Burgers, Pizzas and Salads just for you.</h3>
            </section>

            <section id="menuPartOne">
                <div class="menuline">
                    <img class="menu_icon" src="/assets/imgs/smallBurger.png" alt="small burger picture">
                    <h2>Burger & Sandwiches<h2>
                </div>
                <div class="menu_content">
                    <div class="dishes_container">
                        <img class="menu_images" src="/assets/imgs/VeggieBurger.png" alt="">
                        <h3></h3>
                        <p></p>
                    </div>
                    <div class="dishes_container">
                        <img class="menu_images" src="/assets/imgs/MeatBurger.png" alt="">
                        <h3></h3>
                        <p></p>
                    </div>
                    <div class="dishes_container">
                        <img class="menu_images" src="/assets/imgs/RedBurger.png" alt="">
                        <h3></h3>
                        <p></p>
                    </div>
                    <div class="dishes_container">
                        <img class="menu_images" src="/assets/imgs/ChickenBurger.png" alt="">
                        <h3></h3>
                        <p></p>
                    </div>
                </div>
            </section>

            <section id="menuPartTwo">
                <div class="menuline">
                    <img class="menu_icon" src="/assets/imgs/smallPizza.png" alt="small pizza picture">
                    <h2>Pizza (30cm)<h2>
                </div>
            </section>

            <section id="menuPartThree">
                <div class="menuline">
                    <img class="menu_icon" src="/assets/imgs/smallSalad.png" alt="small salad picture">
                    <h2>Salad<h2>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="content_wrapper">
            <div class="footer_content">
                <a href="#">&copy; 2025 Burger House</a>
                <a href="#">Imprint</a>
                <a href="#">Cookie Preferences</a>
            </div>
        </div>
    </footer>


</body>

<script src="/scripts/db.js"></script>
<script src="/scripts/template.js"></script>
<script src="/script.js"></script>

</html>
