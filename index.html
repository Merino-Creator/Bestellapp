<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellapp</title>
    <link rel="icon" type="image/x-icon" href="/assets/imgs/mainLogo.png">

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/styles/standard.css">
    <link rel="stylesheet" href="/styles/assets.css">
</head>

<body onload="init()">

    <header>
        <div class="header_wrapper">
            <div class="header_content">
                <div><img src="/assets/imgs/mainLogo.png" alt="Bestellapp Logo"></div>
                <div class="burger_menu" onclick="toggleMenu(this)">
                    <div class="bar1"></div>
                    <div class="bar2"></div>
                    <div class="bar3"></div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="content_wrapper">
            <div id="pageContent">
                <section id="topSection" class="full_page">
                    <div class="hero_img"></div>
                    <div class="restaurant_logo"></div>
                    <h1><span style="color: rgb(255, 115, 0);">Burger</span>House
                        <img id="ratingImg" src="/assets/icons/Rating.png" alt="restaurant rating">
                    </h1>
                    <h4>The greatest Burgers, Pizzas and Salads just for you.</h4>
                </section>

                <section id="menuPartOne">
                    <div class="menuline_full">
                        <div class="menuline_inner">
                            <img class="menu_icon" src="/assets/imgs/smallBurger.png" alt="small burger picture">
                            <h2>Burger & Sandwiches</h2>
                        </div>
                    </div>

                    <div id="burgerMenu" class="menu_content"></div>
                </section>

                <section id="menuPartTwo">
                    <div class="menuline_full">
                        <div class="menuline_inner">
                            <img class="menu_icon" src="/assets/imgs/smallPizza.png" alt="small pizza picture">
                            <h2>Pizza (30cm)</h2>
                        </div>
                    </div>

                    <div id="pizzaMenu" class="menu_content"></div>
                </section>

                <section id="menuPartThree">
                    <div class="menuline_full">
                        <div class="menuline_inner">
                            <img class="menu_icon" src="/assets/imgs/smallSalad.png" alt="small salad picture">
                            <h2>Salad</h2>
                        </div>
                    </div>

                    <div id="saladMenu" class="menu_content"></div>
                </section>
            </div>

            <div id="basketContent">
                <section class="basket">
                    <h3>Your Basket</h3>
                    <div id="products">
                        <p>Nothing here yet.<br>
                            Go ahead and choose something delicious!
                        </p>
                    </div>
                    <img id="basketImage" class="basket_img" src="/assets/imgs/shopping_cart.png" alt="">
                </section>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer_wrapper">
            <div class="footer_content">
                <a href="#">&copy; 2025 Burger House</a>
                <a href="#">Imprint</a>
                <a href="#">Cookie Preferences</a>
            </div>
        </div>
    </footer>


</body>

<script src="/scripts/db.js"></script>
<script src="/scripts/template.js"></script>
<script src="/scripts/basket.js"></script>
<script src="/script.js"></script>

</html>
